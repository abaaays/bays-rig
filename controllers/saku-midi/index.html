<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saku-MIDI MKII Configurator</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'Klasikap'; src: local('Klasikap'), url('klasikap.ttf') format('truetype'); }

        :root {
            --bg-color: #e6e6e6; --box-bg: #f8f8f8; --text-main: #111111; --text-muted: #666666;
            --border-color: #222222; --shadow-color: #111111; --rig-bg: #2a2a2a; --input-bg: #ffffff;
            --grid-line: rgba(0,0,0,0.05); --checker-1: #222222; --checker-2: #f8f8f8;
            --font-main: 'Comic Neue', cursive; --font-logo: 'Klasikap', sans-serif; 
            --accent-main: #333333; --dyn-prof-color: #00ffff; --dyn-b6-color: #00ffff;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a; --box-bg: #262626; --text-main: #f0f0f0; --text-muted: #888888;
            --border-color: #e0e0e0; --shadow-color: #050505; --rig-bg: #222222; --input-bg: #111111;
            --grid-line: rgba(255,255,255,0.04); --accent-main: #aaaaaa;
        }

        body, html { 
            height: 100%; margin: 0; overflow: hidden; 
            background-color: var(--bg-color); font-family: var(--font-main); color: var(--text-main); 
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 30px 30px; transition: background-color 0.3s, color 0.3s;
        }
        
        .checker-banner, .checker-bottom { height: 50px; background-image: repeating-conic-gradient(var(--checker-1) 0% 25%, var(--checker-2) 0% 50%); background-size: 50px 50px; width: 100%; position: absolute; z-index: 10; transition: border-color 0.3s;}
        .checker-banner { top: 0; border-bottom: 6px solid var(--border-color); }
        .checker-bottom { bottom: 0; border-top: 6px solid var(--border-color); }

        #config-screen { display: flex; height: 100vh; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; z-index: 5; position: relative;}
        .config-workspace { transform: scale(0.95); transform-origin: center; display: flex; flex-direction: column; align-items: center; width: 100%;}
        
        .canvas-header { font-family: var(--font-logo); font-size: 3.5rem; color: var(--text-main); margin-bottom: 15px; display: flex; align-items: baseline; gap: 15px; letter-spacing: 2px;}
        .hdr-bays { text-transform: lowercase; } .hdr-kontrol { text-transform: uppercase; }
        .badge-lite { font-family: var(--font-main); background: var(--text-main); color: var(--box-bg); font-size: 1rem; padding: 4px 12px; border: 4px solid var(--border-color); border-radius: 4px; transform: translateY(-10px) rotate(-5deg); letter-spacing: 2px;}

        .main-canvas { background: var(--box-bg); border: 6px solid var(--border-color); box-shadow: 12px 12px 0px var(--shadow-color); border-radius: 20px; padding: 25px; width: 1250px; display: flex; gap: 25px;}
        .canvas-left-pane { flex: 0 0 65%; display: flex; flex-direction: column; align-items: center; padding-right: 25px; border-right: 4px dashed var(--border-color);}
        .canvas-right-pane { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }

        .rig-container { 
            width: 700px; height: 430px; background: var(--rig-bg); border: 6px solid #111; 
            border-radius: 20px; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 8px 8px 0px var(--shadow-color);
            margin: 0 auto; overflow: hidden;
        }
        
        .screw { position: absolute; width: 16px; height: 16px; background: #555; border-radius: 50%; border: 2px solid #222; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.3); }
        .screw::after { content: '+'; position: absolute; color: #222; top: -3px; left: 2px; font-weight: bold; font-family: sans-serif; font-size: 14px;}
        .s-tl { top: 10px; left: 10px; } .s-tr { top: 10px; right: 10px; } .s-bl { bottom: 10px; left: 10px; } .s-br { bottom: 10px; right: 10px; }
        .divider { position: absolute; left: 160px; top: 20px; bottom: 20px; width: 4px; background: repeating-linear-gradient(to bottom, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px); }

        .knob-unit { position: absolute; border-radius: 50%; box-shadow: 4px 4px 5px rgba(0,0,0,0.6); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.1s; border: 3px solid #111; }
        .knob-unit:active { transform: translate(2px, 2px); box-shadow: 1px 1px 2px rgba(0,0,0,0.6); }
        .pot-unit { width: 55px; height: 55px; background: linear-gradient(135deg, #777, #444); }
        .pot-unit::after { content: ''; position: absolute; top: 5px; left: 50%; width: 4px; height: 14px; background: rgba(255,255,255,0.7); transform: translateX(-50%); border-radius: 2px; z-index: 1;}
        .enc-unit { width: 85px; height: 85px; background: linear-gradient(135deg, #ddd, #888); }
        .enc-unit::after { content: ''; position: absolute; top: 6px; left: 50%; width: 6px; height: 20px; background: #111; transform: translateX(-50%); border-radius: 2px; z-index: 1;}
        
        /* Layout Positions */
        #hw-ENC { top: 35px; left: 40px; }
        #hw-B11 { top: 160px; left: 55px; }
        #hw-B12 { top: 270px; left: 55px; }

        #hw-P1 { top: 45px; left: 200px; } 
        #hw-P2 { top: 45px; left: 290px; } 
        #hw-P3 { top: 45px; left: 380px; }
        #hw-P4 { top: 45px; left: 470px; }
        #hw-P5 { top: 45px; left: 560px; }

        .btn-row { position: absolute; width: 450px; left: 185px; display: flex; justify-content: space-between; }
        .row-1 { top: 160px; } .row-2 { top: 270px; }

        .btn-unit { 
            position: absolute; width: 55px; height: 55px; background: #151515; border-radius: 12px; border: 4px solid #050505;
            cursor: pointer; box-shadow: inset 0 0 10px #000, 2px 2px 4px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; transition: box-shadow 0.2s, transform 0.1s; 
        }
        
        /* Dark Mode Fixes - Button Shadows */
        [data-theme="dark"] .btn-unit { box-shadow: inset 0 0 10px #000, 0 0 8px rgba(255,255,255,0.15); border-color: #111; }
        [data-theme="dark"] .btn-unit:active { box-shadow: inset 0 0 15px #000, 0 0 4px rgba(255,255,255,0.2); }
        [data-theme="dark"] .knob-unit { box-shadow: 4px 4px 5px rgba(0,0,0,0.8), 0 0 6px rgba(255,255,255,0.1); }
        
        .btn-row .btn-unit { position: relative; } /* Override absolute for flex row items */
        .btn-unit:active { transform: translate(1px, 1px); box-shadow: inset 0 0 15px #000; }
        .btn-unit::before { content: ''; position: absolute; width: 40px; height: 40px; background: #222; border-radius: 8px; border: 1px solid #333; z-index: 1;}
        
        .led-strip { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 30px; height: 6px; border-radius: 4px; background: #333; box-shadow: 0 0 0 rgba(0,0,0,0); transition: 0.3s; }
        
        .pot-id, .enc-id { position: absolute; bottom: -22px; font-size: 0.75rem; font-weight: 800; color: #fff; z-index: 10; text-shadow: 1px 1px 0 #000;}
        .btn-id { position: absolute; top: -8px; right: -8px; background: var(--text-main); color: var(--bg-color); padding: 2px 6px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; z-index: 10; border: 2px solid var(--border-color);} 
        .btn-lbl-n { font-size: 0.75rem; font-weight: 800; color: #fff; margin-bottom: 2px; text-align: center; line-height: 1; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; z-index: 15; text-shadow: 1px 1px 2px #000;}
        .btn-lbl-div { width: 70%; height: 2px; background: rgba(255,255,255,0.4); margin: 2px 0; z-index: 15;}
        .btn-lbl-s { font-size: 0.75rem; font-weight: 800; color: #aaa; margin-top: 2px; text-align: center; line-height: 1; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; z-index: 15; text-shadow: 1px 1px 2px #000;}

        /* B12 Hardcode Visual - Subtle Grey */
        #hw-B12 { border-color: #666 !important; }
        #hw-B12::before { background: #444 !important; }
        #hw-B12 .btn-id { background: #222; color: #ddd; border-color: #111;}
        .btn-b12-shift { cursor: not-allowed; } .btn-b12-shift:active { transform: none; box-shadow: inset 0 0 10px #000; }
        .b12-lbl { color: #f0f0f0 !important; font-size: 0.85rem;}

        .tab-area { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-tab { padding: 8px 25px; border: 4px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-family: var(--font-main); font-weight: bold; font-size: 1.2rem; cursor: pointer; border-radius: 10px; box-shadow: 4px 4px 0px var(--shadow-color); transition: 0.2s;}
        .btn-tab.active { background: var(--text-main); color: var(--bg-color); box-shadow: 0 0 0 var(--shadow-color); transform: translate(4px,4px); border-color: var(--text-main);}

        .led-box { border: 4px solid var(--border-color); padding: 15px 20px; background: var(--box-bg); border-radius: 15px; box-shadow: 6px 6px 0px var(--shadow-color); margin-bottom: 15px;}
        .ctrl-row { margin-bottom: 10px; }
        .ctrl-row label { font-weight: bold; margin-bottom: 6px; font-size: 1rem; display: flex; align-items: center; gap: 10px;}
        .badge-percent { background: var(--bg-color); padding: 2px 8px; border: 3px solid var(--border-color); border-radius: 6px; font-size: 0.85rem; box-shadow: 2px 2px 0 var(--shadow-color);}
        
        .neo-select, .neo-input { width: 100%; border: 3px solid var(--border-color); border-radius: 8px; padding: 6px; font-family: var(--font-main); font-weight: bold; background: var(--input-bg); color: var(--text-main); box-shadow: 3px 3px 0px var(--shadow-color); box-sizing: border-box;}
        
        .color-flex { display: grid; grid-template-columns: 1fr 1fr; gap: 10px;}
        input[type="color"] { width: 100%; height: 35px; border: 3px solid var(--border-color); border-radius: 8px; cursor: pointer; padding: 0;}
        .slider-wrapper { padding-bottom: 15px; background: var(--input-bg); border: 3px solid var(--border-color); padding: 15px 15px 5px 15px; border-radius: 8px;}
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 12px; background: #999; border: 2px solid var(--border-color); border-radius: 6px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 30px; width: 20px; border-radius: 4px; background: var(--text-main); border: 3px solid var(--border-color); margin-top: -10px; box-shadow: 3px 3px 0 var(--shadow-color);}

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-action { padding: 10px; border: 4px solid var(--border-color); background: var(--input-bg); color: var(--text-main); border-radius: 10px; font-family: var(--font-main); font-weight: bold; cursor: pointer; box-shadow: 4px 4px 0px var(--shadow-color); font-size: 0.95rem;}
        .btn-main { background: var(--text-main); color: var(--bg-color); font-size: 1.2rem; grid-column: span 2; padding: 15px; }
        .btn-main.unsaved { background: #ff4757; color: #ffffff; border-color: #ff4757; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); } }

        .cb-container { display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; gap: 8px; cursor: pointer; color: var(--text-main); }
        .cb-neo { appearance: none; width: 18px; height: 18px; border: 3px solid var(--border-color); border-radius: 4px; background: var(--input-bg); position: relative; box-shadow: 2px 2px 0 var(--shadow-color);}
        .cb-neo:checked { background: var(--text-main); }
        .cb-neo:checked::after { content: '✔'; position: absolute; color: var(--bg-color); font-weight: bold; top: -3px; left: 1px; }

        .mod-checks { display: flex; gap: 10px; justify-content: space-between; background: var(--rig-bg); padding: 10px; border-radius: 8px; border: 2px solid var(--border-color); margin-bottom: 10px; color: #fff;}
        .mod-checks label { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; cursor: pointer; color: #fff; }

        .serial-box { display: flex; gap: 10px; margin-top: 5px; }
        .btn-sync { flex: 1; padding: 8px; border: 3px solid var(--border-color); border-radius: 8px; background: var(--box-bg); color: var(--text-main); font-family: var(--font-main); font-weight: bold; box-shadow: 3px 3px 0 var(--shadow-color); cursor: pointer;}
        #serial-status { flex: 2; text-align: center; padding: 8px; border: 3px solid var(--border-color); border-radius: 8px; background: var(--box-bg); color: var(--text-main); font-weight: bold; box-shadow: 3px 3px 0 var(--shadow-color); cursor: pointer;}
        
        .theme-toggle-wrap { display: flex; justify-content: center; width: 100%; margin-top: 25px;}
        .theme-switch { width: 60px; height: 30px; border: 4px solid var(--border-color); background: var(--checker-2); box-shadow: 4px 4px 0 var(--shadow-color); cursor: pointer; position: relative; transition: 0.2s;}
        .theme-switch:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--shadow-color); }
        .theme-switch-knob { width: 22px; height: 22px; background: var(--checker-1); position: absolute; top: 0px; left: 0px; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        [data-theme="dark"] .theme-switch-knob { left: 30px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--box-bg); width: 700px; max-height: 90vh; overflow-y: auto; border: 5px solid var(--border-color); box-shadow: 12px 12px 0px var(--shadow-color); border-radius: 20px;}
        .modal-header { background: var(--border-color); color: var(--bg-color); padding: 15px 25px; display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: bold; position: sticky; top: 0; z-index: 10;}
        .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .layer-unit { border: 4px solid var(--border-color); border-radius: 12px; padding: 20px; background: var(--box-bg); position: relative; box-shadow: 5px 5px 0 var(--shadow-color); }
        .layer-lbl { position: absolute; top: -15px; left: 15px; background: var(--text-main); color: var(--bg-color); padding: 2px 12px; font-weight: bold; border-radius: 5px; }
        .shift-lbl { background: var(--text-muted); color: var(--box-bg); }
        .row-edit { display: flex; gap: 10px; align-items: center; margin-top: 10px;}
        .hidden { display: none !important; }

        .toast-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 9999; visibility: hidden; opacity: 0; transition: all 0.2s; }
        .toast-overlay.active { visibility: visible; opacity: 1; }
        .toast-box { background-color: var(--box-bg); border: 6px solid var(--border-color); padding: 30px 50px; box-shadow: 15px 15px 0 var(--text-main); transform: rotate(-2deg); }
        .toast-msg { font-size: 1.5rem; font-weight: 900; text-transform: uppercase;}
        
        .custom-key-btn { background-color: var(--input-bg); border: 3px solid var(--border-color); padding: 8px 15px; font-family: var(--font-main); font-weight: bold; box-shadow: 3px 3px 0 var(--shadow-color); flex: 1; text-align: left; cursor: pointer; display: flex; justify-content: space-between; border-radius: 8px;}
        .kp-section { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; background: var(--rig-bg); border: 3px solid var(--border-color); padding: 12px; border-radius: 8px;}
        .kp-title { width: 100%; font-size: 0.9rem; font-weight: bold; margin-bottom: 8px; border-bottom: 2px solid var(--border-color); padding-bottom: 4px; color: #fff;}
        .kp-btn { background: var(--box-bg); border: 2px solid var(--border-color); font-family: var(--font-main); font-size: 0.85rem; font-weight: bold; cursor: pointer; padding: 6px 10px; border-radius: 4px; color: var(--text-main);}
        .kp-btn:hover { background: var(--text-main); color: var(--bg-color);}
    </style>
</head>
<body>

<div id="toastOverlay" class="toast-overlay"><div class="toast-box"><div id="toastMessage" class="toast-msg">Pesan...</div></div></div>
<div class="checker-banner"></div>

<div id="config-screen">
    <div class="config-workspace">
        <div class="canvas-header"><span class="hdr-bays">saku</span><span class="hdr-kontrol">MIDI</span><span class="badge-lite">MKII</span></div>
        
        <div class="main-canvas">
            <div class="canvas-left-pane">
                <div class="tab-area">
                    <button id="p0" class="btn-tab active" onclick="switchBank(0)">Bank 0</button>
                    <button id="p1" class="btn-tab" onclick="switchBank(1)">Bank 1</button>
                    <button id="p2" class="btn-tab" onclick="switchBank(2)">Bank 2</button>
                </div>
                
                <div class="rig-container">
                    <div class="screw s-tl"></div><div class="screw s-tr"></div>
                    <div class="screw s-bl"></div><div class="screw s-br"></div>
                    <div class="divider"></div>
                    
                    <div class="knob-unit enc-unit" id="hw-ENC" onclick="openEditor('enc', 0)"><div class="enc-id">ENC</div><div class="btn-lbl-n" id="lbl-enc-n" style="color:#111; text-shadow:none;">Off</div><div class="btn-lbl-div" id="div-enc" style="background:#555;"></div><div class="btn-lbl-s" id="lbl-enc-s" style="color:#444; text-shadow:none;">Off</div></div>
                    <div class="btn-unit" id="hw-B11" onclick="openEditor('btn', 10)"><div class="led-strip" id="led-b10"></div><div class="btn-id">B11</div><div class="btn-lbl-n" id="lbl-b10-n">Off</div><div class="btn-lbl-div" id="div-b10"></div><div class="btn-lbl-s" id="lbl-b10-s">Off</div></div>
                    <div class="btn-unit btn-b12-shift" id="hw-B12"><div class="led-strip" id="led-b11"></div><div class="btn-id">B12</div><div class="btn-lbl-n b12-lbl" id="lbl-b11-n">SHIFT</div><div class="btn-lbl-div" id="div-b11" style="display:none;"></div><div class="btn-lbl-s b12-lbl" id="lbl-b11-s"></div></div>

                    <div class="knob-unit pot-unit" id="hw-P1" onclick="openEditor('pot', 0)"><div class="pot-id">P1</div><div class="btn-lbl-n" id="lbl-p0-n">CC</div><div class="btn-lbl-div" id="div-p0"></div><div class="btn-lbl-s" id="lbl-p0-s">CC</div></div>
                    <div class="knob-unit pot-unit" id="hw-P2" onclick="openEditor('pot', 1)"><div class="pot-id">P2</div><div class="btn-lbl-n" id="lbl-p1-n">CC</div><div class="btn-lbl-div" id="div-p1"></div><div class="btn-lbl-s" id="lbl-p1-s">CC</div></div>
                    <div class="knob-unit pot-unit" id="hw-P3" onclick="openEditor('pot', 2)"><div class="pot-id">P3</div><div class="btn-lbl-n" id="lbl-p2-n">CC</div><div class="btn-lbl-div" id="div-p2"></div><div class="btn-lbl-s" id="lbl-p2-s">CC</div></div>
                    <div class="knob-unit pot-unit" id="hw-P4" onclick="openEditor('pot', 3)"><div class="pot-id">P4</div><div class="btn-lbl-n" id="lbl-p3-n">CC</div><div class="btn-lbl-div" id="div-p3"></div><div class="btn-lbl-s" id="lbl-p3-s">CC</div></div>
                    <div class="knob-unit pot-unit" id="hw-P5" onclick="openEditor('pot', 4)"><div class="pot-id">P5</div><div class="btn-lbl-n" id="lbl-p4-n">CC</div><div class="btn-lbl-div" id="div-p4"></div><div class="btn-lbl-s" id="lbl-p4-s">CC</div></div>
                    
                    <div class="btn-row row-1">
                        <div class="btn-unit" onclick="openEditor('btn', 0)"><div class="led-strip" id="led-b0"></div><div class="btn-id">B1</div><div class="btn-lbl-n" id="lbl-b0-n">Off</div><div class="btn-lbl-div" id="div-b0"></div><div class="btn-lbl-s" id="lbl-b0-s">Off</div></div>
                        <div class="btn-unit" onclick="openEditor('btn', 1)"><div class="led-strip" id="led-b1"></div><div class="btn-id">B2</div><div class="btn-lbl-n" id="lbl-b1-n">Off</div><div class="btn-lbl-div" id="div-b1"></div><div class="btn-lbl-s" id="lbl-b1-s">Off</div></div>
                        <div class="btn-unit" onclick="openEditor('btn', 2)"><div class="led-strip" id="led-b2"></div><div class="btn-id">B3</div><div class="btn-lbl-n" id="lbl-b2-n">Off</div><div class="btn-lbl-div" id="div-b2"></div><div class="btn-lbl-s" id="lbl-b2-s">Off</div></div>
                        <div class="btn-unit" onclick="openEditor('btn', 3)"><div class="led-strip" id="led-b3"></div><div class="btn-id">B4</div><div class="btn-lbl-n" id="lbl-b3-n">Off</div><div class="btn-lbl-div" id="div-b3"></div><div class="btn-lbl-s" id="lbl-b3-s">Off</div></div>
                        <div class="btn-unit" onclick="openEditor('btn', 4)"><div class="led-strip" id="led-b4"></div><div class="btn-id">B5</div><div class="btn-lbl-n" id="lbl-b4-n">Off</div><div class="btn-lbl-div" id="div-b4"></div><div class="btn-lbl-s" id="lbl-b4-s">Off</div></div>
                    </div>
                    
                    <div class="btn-row row-2">
                        <div class="btn-unit" onclick="openEditor('btn', 5)"><div class="led-strip" id="led-b5"></div><div class="btn-id">B6</div><div class="btn-lbl-n" id="lbl-b5-n">Off</div><div class="btn-lbl-div" id="div-b5"></div><div class="btn-lbl-s" id="lbl-b5-s">Off</div></div>

<script>
    const act4 = {m:0, v1:0, v2:0, v3:0, lbl:""}; 
    const act10 = {m:0, v1:0, v2:0, v3:0, t1:"", t2:"", lbl:""};

    let cfg = {
        bank0: { btn: Array.from({length:11}, () => ({...act4})), pot: Array.from({length:5}, (_,i) => ({...act4, m:2, v1:1, v2:71+i})), enc: {...act4, m:1}, bright: 100, anim: 1, animSpeed: 50, col: [0,255,255], colActive: [255,255,255], colShift: [255,128,0] },
        bank1: { btn1_2: Array.from({length:2}, () => Array.from({length:2}, () => ({...act4}))), btn3_5: Array.from({length:2}, () => Array.from({length:3}, () => ({...act10}))), btn6_11: Array.from({length:2}, () => Array.from({length:6}, () => ({...act4}))), pot: Array.from({length:2}, () => Array.from({length:5}, (_,i) => ({...act4, m:2, v1:1, v2:71+i}))), enc: Array.from({length:2}, () => ({...act4, m:1})), bright: 100, anim: 1, animSpeed: 50, col: [255,0,255], colActive: [255,255,255], colShift: [255,128,0], colB6: [0,255,255] },
        bank2: { btn1_2: Array.from({length:2}, () => Array.from({length:2}, () => ({...act4}))), btn3_5: Array.from({length:2}, () => Array.from({length:3}, () => ({...act10}))), btn6_11: Array.from({length:2}, () => Array.from({length:6}, () => ({...act4}))), pot: Array.from({length:2}, () => Array.from({length:5}, (_,i) => ({...act4, m:2, v1:1, v2:71+i}))), enc: Array.from({length:2}, () => ({...act4, m:1})), bright: 100, anim: 1, animSpeed: 50, col: [255,255,0], colActive: [255,255,255], colShift: [255,128,0], colB6: [0,255,255] }
    };
    
    let curB = 0, curT = '', curI = 0, port, serialReader, currentKeyTarget = ''; 

    function toggleTheme() { const doc = document.documentElement; const cur = doc.getAttribute('data-theme'); const next = cur === 'dark' ? 'light' : 'dark'; doc.setAttribute('data-theme', next); localStorage.setItem('baysMK2Theme', next); }
    function showToast(msg) { const o = document.getElementById('toastOverlay'); document.getElementById('toastMessage').innerText = msg; o.classList.add('active'); setTimeout(()=>o.classList.remove('active'), 2500); }
    function markUnsaved() { const b = document.getElementById('btn-push'); b.classList.add('unsaved'); b.innerText = "⚠️ UNSAVED CHANGES!"; }
    function markSaved() { const b = document.getElementById('btn-push'); b.classList.remove('unsaved'); b.innerText = "⚡ PUSH TO DEVICE"; }

    window.onload = () => { 
        const savedTheme = localStorage.getItem('baysMK2Theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        buildOptions(); buildKeyPicker(); loadAutoSave(); 
    };

    function getKeyDisplayLabel(val) {
        if(val == 0) return 'NONE'; if(val == 234) return 'NUM 0'; if(val >= 225 && val <= 233) return 'NUM ' + (val-224); if(val >= 194 && val <= 205) return 'F' + (val-193); if(val >= 97 && val <= 122) return String.fromCharCode(val-32).toUpperCase(); if(val >= 65 && val <= 90) return String.fromCharCode(val).toUpperCase();
        const navMap = {176:'ENT',177:'ESC',178:'BKS',179:'TAB',32:'SPC',218:'UP',217:'DWN',216:'LFT',215:'RGT'};
        if(navMap[val]) return navMap[val]; return String.fromCharCode(val);
    }

    function buildOptions() {
        ['n','s'].forEach(l => { 
            let ch = ''; for(let i=1; i<=16; i++) ch += `<option value="${i}">CH ${i}</option>`; document.getElementById(`${l}-chan`).innerHTML = ch; 
        });
    }

    function buildKeyPicker() {
        let kpHTML = `<button type="button" class="kp-btn" onclick="selectKey(0)" style="background:#ff4757; color:#fff; width: 100%; margin-bottom: 15px;">[ X ] NONE / KOSONG</button>`;
        const addGroup = (title, items) => { kpHTML += `<div class="kp-section"><div class="kp-title">${title}</div>`; items.forEach(i => { let htmlStr = i.l === '<' ? '&lt;' : (i.l === '>' ? '&gt;' : (i.l === '"' ? '&quot;' : i.l)); kpHTML += `<button type="button" class="kp-btn" onclick="selectKey(${i.v})">${htmlStr}</button>`; }); kpHTML += `</div>`; };
        let numpad = [{v:234,l:'NUM 0'}]; for(let i=1;i<=9;i++) numpad.push({v:224+i, l:`NUM ${i}`}); addGroup('NUMPAD', numpad);
        let nav = [{v:176,l:'ENTER'},{v:177,l:'ESC'},{v:178,l:'BKSPACE'},{v:179,l:'TAB'},{v:32,l:'SPACE'},{v:218,l:'UP'},{v:217,l:'DOWN'},{v:216,l:'LEFT'},{v:215,l:'RIGHT'}]; addGroup('NAVIGASI', nav);
        let fkeys = []; for(let i=1;i<=12;i++) fkeys.push({v:193+i, l:`F${i}`}); addGroup('F1 - F12', fkeys);
        let alpha = []; for(let i=65;i<=90;i++) alpha.push({v:i+32, l:String.fromCharCode(i)}); addGroup('ALFABET', alpha);
        let sym = []; '~"()<>!@#$%^&*_+:?-=/?.,'.split('').forEach(s => sym.push({v:s.charCodeAt(0), l:s})); addGroup('SIMBOL', sym);
        document.getElementById('keyPickerContainer').innerHTML = kpHTML;
    }

    function openKeyPicker(targetId) { currentKeyTarget = targetId; document.getElementById('keyPickerModal').style.display = 'flex'; }
    function closeKeyPicker() { document.getElementById('keyPickerModal').style.display = 'none'; }
    function selectKey(val) { document.getElementById(`${currentKeyTarget}`).value = val; document.getElementById(`${currentKeyTarget}-btn`).innerText = getKeyDisplayLabel(val); closeKeyPicker(); }
    function getBankObj(b) { return b === 0 ? cfg.bank0 : (b === 1 ? cfg.bank1 : cfg.bank2); }

    function switchBank(b) {
        curB = b; ['p0','p1','p2'].forEach((id, i) => document.getElementById(id).classList.toggle('active', i===b));
        document.getElementById('curP').innerText = b; let bankObj = getBankObj(b);
        document.getElementById('ui-bright').value = bankObj.bright; document.getElementById('bright-val').innerText = bankObj.bright + '%';
        document.getElementById('ui-anim').value = bankObj.anim; 
        document.getElementById('ui-speed').value = bankObj.animSpeed || 50; document.getElementById('speed-val').innerText = (bankObj.animSpeed || 50) + '%';
        document.getElementById('ui-color').value = rgbToHex(bankObj.col);
        document.getElementById('ui-color-active').value = rgbToHex(bankObj.colActive); document.getElementById('ui-color-shift').value = rgbToHex(bankObj.colShift);
        
        const b6Wrap = document.getElementById('col-b6-wrap');
        if (b === 0) { b6Wrap.classList.add('hidden'); } 
        else { b6Wrap.classList.remove('hidden'); document.getElementById('ui-color-b6').value = rgbToHex(bankObj.colB6); }
        updateLedStripsVisual(); updateAllLabels();
    }

    function updateLedStripsVisual() {
        let bankObj = getBankObj(curB); let baseCol = rgbToHex(bankObj.col);
        document.documentElement.style.setProperty('--dyn-prof-color', baseCol); 
        for(let i=0; i<11; i++) { let strip = document.getElementById(`led-b${i}`); if(strip) { strip.style.backgroundColor = baseCol; strip.style.boxShadow = `0 0 10px ${baseCol}`; } }
        let strip11 = document.getElementById('led-b11'); if(strip11) { strip11.style.backgroundColor = (curB>0) ? rgbToHex(bankObj.colB6) : '#444'; strip11.style.boxShadow = (curB>0) ? `0 0 10px ${rgbToHex(bankObj.colB6)}` : 'none'; }
    }

    function buildModLabel(v) { let m=[]; if(v&1)m.push("CT"); if(v&2)m.push("SH"); if(v&4)m.push("AL"); if(v&8)m.push("WN"); return m.join('+'); }

    function buildLabel(d) {
        if(!d) return ""; if(d.lbl && d.lbl.trim() !== "") return d.lbl; if(d.m==0) return "OFF";
        if(d.m==1) { let ml = buildModLabel(d.v1); let k = d.v2?getKeyDisplayLabel(d.v2):""; return (ml+(ml&&k?'+':"")+k) || "NONE"; }
        if(d.m==2) return `CC ${d.v2}`; if(d.m==3) return "MEDIA"; if(d.m==4) return "MACRO";
        if(d.m==5) return {1:"PG U/D", 2:"SCROLL", 3:"ZOOM", 4:"UNDO/RED", 5:"COPY/PST", 6:"HOME/END", 7:"TRK P/N"}[d.v1] || "PC NAV";
        return d.m==6 ? "SHORTCUT" : "";
    }

    function updateAllLabels() {
        for(let i=0; i<11; i++) {
            let dN, dS;
            if (curB === 0) { dN = cfg.bank0.btn[i]; } 
            else { 
                let bObj = getBankObj(curB); 
                if(i<2) { dN = bObj.btn1_2[0][i]; dS = bObj.btn1_2[1][i]; } 
                else if(i<5) { dN = bObj.btn3_5[0][i-2]; dS = bObj.btn3_5[1][i-2]; } 
                else { dN = bObj.btn6_11[0][i-5]; dS = bObj.btn6_11[1][i-5]; } 
            }
            document.getElementById(`lbl-b${i}-n`).innerText = buildLabel(dN); document.getElementById(`lbl-b${i}-s`).innerText = curB===0 ? "" : buildLabel(dS); document.getElementById(`div-b${i}`).style.display = curB===0 ? "none" : "block";
        }
        for(let i=0; i<5; i++){
            let dN = curB===0 ? cfg.bank0.pot[i] : getBankObj(curB).pot[0][i]; let dS = curB===0 ? null : getBankObj(curB).pot[1][i];
            document.getElementById(`lbl-p${i}-n`).innerText = buildLabel(dN); document.getElementById(`lbl-p${i}-s`).innerText = curB===0 ? "" : buildLabel(dS); document.getElementById(`div-p${i}`).style.display = curB===0 ? "none" : "block";
        }
        let dEN = curB===0 ? cfg.bank0.enc : getBankObj(curB).enc[0]; let dES = curB===0 ? null : getBankObj(curB).enc[1];
        document.getElementById(`lbl-enc-n`).innerText = buildLabel(dEN); document.getElementById(`lbl-enc-s`).innerText = curB===0 ? "" : buildLabel(dES); document.getElementById(`div-enc`).style.display = curB===0 ? "none" : "block";
    }

    function updateBright(v) { document.getElementById('bright-val').innerText = v + '%'; getBankObj(curB).bright = parseInt(v); autoSave(); }
    function updateSpeed(v) { document.getElementById('speed-val').innerText = v + '%'; getBankObj(curB).animSpeed = parseInt(v); autoSave(); }

    function openEditor(type, idx) {
        curT = type; curI = idx;
        let dName = type === 'btn' ? `B${idx+1}` : (type === 'pot' ? `POTENSIO ${idx+1}` : "ENCODER");
        document.getElementById('m-title').innerText = `${dName} (BANK ${curB})`;
        
        let hasShift = curB > 0; document.getElementById('s-box').style.display = hasShift ? 'block' : 'none';
        let maxLen = (curB > 0 && type === 'btn' && idx >= 2 && idx <= 4) ? 10 : 4;
        document.getElementById('n-lbl').maxLength = maxLen; document.getElementById('s-lbl').maxLength = maxLen;
        document.getElementById('n-lbl').placeholder = `Label (Max ${maxLen})`; document.getElementById('s-lbl').placeholder = `Label (Max ${maxLen})`;

        const nm = document.getElementById('n-m'), sm = document.getElementById('s-m');
        if(type==='btn') {
            let opt = '<option value="0">OFF</option><option value="1">SHORTCUT</option><option value="2">MIDI CC</option><option value="3">MEDIA</option>';
            if (curB > 0 && idx >= 2 && idx <= 4) opt += '<option value="4">MACRO</option>'; nm.innerHTML = opt; sm.innerHTML = opt;
        } else if(type==='enc') {
            const opt = '<option value="0">OFF</option><option value="1">VOLUME HID</option><option value="2">MIDI RELATIF</option><option value="3">MEDIA TRACK</option><option value="4">MIDI ABSOLUT</option><option value="5">PC NAVIGASI</option><option value="6">SHORTCUT KUSTOM</option>'; nm.innerHTML = opt; sm.innerHTML = opt;
        } else {
            const opt = '<option value="0">OFF</option><option value="2">MIDI ABSOLUT</option>'; nm.innerHTML = opt; sm.innerHTML = opt; 
        }
        
        const fill = (l, d) => {
            if(!d) return; document.getElementById(`${l}-m`).value = d.m; document.getElementById(`${l}-lbl`).value = d.lbl || ""; 
            if(type==='pot') { document.getElementById(`${l}-ui-sto`).classList.remove('hidden'); document.getElementById(`${l}-sto`).checked = (d.v3 == 1); } 
            else { let e = document.getElementById(`${l}-ui-sto`); if(e) e.classList.add('hidden'); }
            
            if(d.m==1) { 
                document.getElementById(`${l}-mod-ctrl`).checked = (d.v1 & 1); document.getElementById(`${l}-mod-shift`).checked = (d.v1 & 2); document.getElementById(`${l}-mod-alt`).checked = (d.v1 & 4); document.getElementById(`${l}-mod-win`).checked = (d.v1 & 8);
                document.getElementById(`${l}-key`).value = d.v2; document.getElementById(`${l}-key-btn`).innerText = getKeyDisplayLabel(d.v2); 
            }
            if(d.m==2||d.m==4) { document.getElementById(`${l}-chan`).value = d.v1||1; document.getElementById(`${l}-cc`).value = d.v2; if(type==='enc'&&d.m==2) document.getElementById(`${l}-cc2`).value=d.v3; }
            if(d.m==3) { document.getElementById(`${l}-med`).value = d.v1||205; }
            if(d.m==4&&type==='btn') { document.getElementById(`${l}-mac-act1`).value=d.v1||1; document.getElementById(`${l}-mac-act2`).value=d.v2||1; document.getElementById(`${l}-mac-txt1`).value=d.t1||""; document.getElementById(`${l}-mac-txt2`).value=d.t2||""; }
            if(d.m==5&&type==='enc') { document.getElementById(`${l}-nav-opt`).value = d.v1||1; }
            if(d.m==6&&type==='enc') { 
                document.getElementById(`${l}-enc-mod-ctrl`).checked = (d.v1 & 1); document.getElementById(`${l}-enc-mod-shift`).checked = (d.v1 & 2); document.getElementById(`${l}-enc-mod-alt`).checked = (d.v1 & 4); document.getElementById(`${l}-enc-mod-win`).checked = (d.v1 & 8);
                document.getElementById(`${l}-enc-l`).value=d.v2||0; document.getElementById(`${l}-enc-l-btn`).innerText=getKeyDisplayLabel(d.v2||0); document.getElementById(`${l}-enc-r`).value=d.v3||0; document.getElementById(`${l}-enc-r-btn`).innerText=getKeyDisplayLabel(d.v3||0); 
            }
            uiLogic(l);
        };
        
        let dN, dS;
        if(curB === 0) { dN = type==='btn'?cfg.bank0.btn[idx]:(type==='pot'?cfg.bank0.pot[idx]:cfg.bank0.enc); } 
        else { 
            let bObj = getBankObj(curB); 
            if(type==='btn') { 
                if(idx<2){ dN=bObj.btn1_2[0][idx]; dS=bObj.btn1_2[1][idx]; } 
                else if(idx<5){ dN=bObj.btn3_5[0][idx-2]; dS=bObj.btn3_5[1][idx-2]; } 
                else { dN=bObj.btn6_11[0][idx-5]; dS=bObj.btn6_11[1][idx-5]; } 
            } 
            if(type==='pot') { dN=bObj.pot[0][idx]; dS=bObj.pot[1][idx]; } if(type==='enc') { dN=bObj.enc[0]; dS=bObj.enc[1]; } 
        }
        fill('n', dN); if(hasShift) fill('s', dS);
        document.getElementById('modal').style.display = 'flex';
    }

    function uiLogic(l) {
        const m = parseInt(document.getElementById(`${l}-m`).value);
        ['midi','short','macro','media','nav','enc-short'].forEach(x => { let el = document.getElementById(`${l}-ui-${x}`); if(el) el.classList.add('hidden'); });
        if(curT === 'btn') {
            if(m==1) document.getElementById(`${l}-ui-short`).classList.remove('hidden'); if(m==2) document.getElementById(`${l}-ui-midi`).classList.remove('hidden'); if(m==3) document.getElementById(`${l}-ui-media`).classList.remove('hidden');
            if(m==4) { document.getElementById(`${l}-ui-macro`).classList.remove('hidden'); let sub=document.getElementById(`${l}-mac-sub`); if(sub) sub.classList.toggle('hidden', document.getElementById(`${l}-mac-act2`).value!=2); }
        } else if (curT === 'enc') {
            if(m==2 || m==4) { document.getElementById(`${l}-ui-midi`).classList.remove('hidden'); let cc2=document.getElementById(`${l}-cc2`); if(cc2) cc2.classList.toggle('hidden', m!=2); }
            if(m==3) document.getElementById(`${l}-ui-media`).classList.remove('hidden'); if(m==5) document.getElementById(`${l}-ui-nav`).classList.remove('hidden'); if(m==6) document.getElementById(`${l}-ui-enc-short`).classList.remove('hidden');
        } else if (curT === 'pot') { if(m==2) document.getElementById(`${l}-ui-midi`).classList.remove('hidden'); }
    }

    function saveConfig() {
        const get = (l) => {
            let m = parseInt(document.getElementById(`${l}-m`).value); let d = (curB > 0 && curT==='btn' && curI>=2 && curI<=4) ? {...act10} : {...act4}; d.m = m; d.lbl = document.getElementById(`${l}-lbl`).value; 
            if(curT === 'pot') { d.v3 = document.getElementById(`${l}-sto`).checked ? 1 : 0; }
            if(m==1){ 
                let mod = 0; if(document.getElementById(`${l}-mod-ctrl`).checked) mod |= 1; if(document.getElementById(`${l}-mod-shift`).checked) mod |= 2; if(document.getElementById(`${l}-mod-alt`).checked) mod |= 4; if(document.getElementById(`${l}-mod-win`).checked) mod |= 8;
                d.v1 = mod; d.v2=parseInt(document.getElementById(`${l}-key`).value)||0; d.v3=0; 
            }
            if(m==2||m==4){ d.v1=parseInt(document.getElementById(`${l}-chan`).value)||1; d.v2=parseInt(document.getElementById(`${l}-cc`).value)||0; if(curT==='enc'&&m==2) d.v3=parseInt(document.getElementById(`${l}-cc2`).value)||0; }
            if(m==3){ d.v1=parseInt(document.getElementById(`${l}-med`).value)||205; }
            if(m==4&&curT==='btn'){ d.v1=parseInt(document.getElementById(`${l}-mac-act1`).value)||1; d.v2=parseInt(document.getElementById(`${l}-mac-act2`).value)||1; d.t1=document.getElementById(`${l}-mac-txt1`).value; d.t2=document.getElementById(`${l}-mac-txt2`).value; }
            if(m==5&&curT==='enc'){ d.v1=parseInt(document.getElementById(`${l}-nav-opt`).value)||1; }
            if(m==6&&curT==='enc'){ 
                let mod = 0; if(document.getElementById(`${l}-enc-mod-ctrl`).checked) mod |= 1; if(document.getElementById(`${l}-enc-mod-shift`).checked) mod |= 2; if(document.getElementById(`${l}-enc-mod-alt`).checked) mod |= 4; if(document.getElementById(`${l}-enc-mod-win`).checked) mod |= 8;
                d.v1 = mod; d.v2=parseInt(document.getElementById(`${l}-enc-l`).value)||0; d.v3=parseInt(document.getElementById(`${l}-enc-r`).value)||0; 
            }
            return d;
        };
        
        let gN = get('n'), gS = curB>0 ? get('s') : null;
        if(curB === 0) { if(curT==='btn') cfg.bank0.btn[curI] = gN; if(curT==='pot') cfg.bank0.pot[curI] = gN; if(curT==='enc') cfg.bank0.enc = gN; } 
        else { 
            let bObj = getBankObj(curB); 
            if(curT==='btn') { 
                if(curI<2){ bObj.btn1_2[0][curI]=gN; bObj.btn1_2[1][curI]=gS; } 
                else if(curI<5){ bObj.btn3_5[0][curI-2]=gN; bObj.btn3_5[1][curI-2]=gS; } 
                else { bObj.btn6_11[0][curI-5]=gN; bObj.btn6_11[1][curI-5]=gS; } 
            } 
            if(curT==='pot') { bObj.pot[0][curI]=gN; bObj.pot[1][curI]=gS; } if(curT==='enc') { bObj.enc[0]=gN; bObj.enc[1]=gS; } 
        }
        closeModal(); autoSave(); updateAllLabels(); showToast("TERSIPMAN SEMENTARA!");
    }

    function closeModal() { document.getElementById('modal').style.display='none'; closeKeyPicker(); }
    
    function autoSave() { 
        let bObj = getBankObj(curB);
        bObj.anim = parseInt(document.getElementById('ui-anim').value); bObj.col = hexToRgb(document.getElementById('ui-color').value);
        bObj.colActive = hexToRgb(document.getElementById('ui-color-active').value); bObj.colShift = hexToRgb(document.getElementById('ui-color-shift').value);
        if(document.getElementById('ui-speed')) bObj.animSpeed = parseInt(document.getElementById('ui-speed').value);
        if (curB > 0) bObj.colB6 = hexToRgb(document.getElementById('ui-color-b6').value);
        updateLedStripsVisual(); localStorage.setItem('baysKONTROLMK2', JSON.stringify(cfg)); markUnsaved();
    }
    
    function loadAutoSave() { const s = localStorage.getItem('baysKONTROLMK2'); if(s) { try { let loaded = JSON.parse(s); if(loaded.bank0) cfg = loaded; } catch(e) {} } switchBank(0); }
    function hexToRgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
    function rgbToHex(arr) { return "#" + arr.map(x=>x.toString(16).padStart(2,'0')).join(''); }

    function exportData() { const blob = new Blob([JSON.stringify(cfg)], {type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='bayskontrol_mk2.json'; a.click(); showToast("EXPORT BERHASIL!"); }
    function importData() { document.getElementById('f-import').click(); }
    function handleImport(i) { const fr = new FileReader(); fr.onload = (e) => { cfg = JSON.parse(e.target.result); switchBank(0); markUnsaved(); showToast("IMPORT SUKSES!"); }; fr.readAsText(i.files[0]); i.value=''; }

    async function connectUSB() {
        try {
            port = await navigator.serial.requestPort(); await port.open({ baudRate: 115200 });
            document.getElementById('serial-status').innerText = "CONNECTED"; document.getElementById('serial-status').style.color = "var(--box-bg)"; document.getElementById('serial-status').style.background = "var(--text-main)";
            const decoder = new TextDecoderStream(); port.readable.pipeTo(decoder.writable); serialReader = decoder.readable.getReader();
            showToast("DEVICE TERHUBUNG!"); return true;
        } catch(e) { return false; }
    }

    // CATATAN MESIN: Fungsi Hex builder ini belum menyuntikkan data animSpeed ke struktur buffer 
    // agar sinkronisasi dengan firmware Arduino (.ino) saat ini tidak rusak. Akan diperbarui di revisi Arduino berikutnya.
    async function pushToEEPROM() {
        if(!port) { let connected = await connectUSB(); if(!connected) return; }
        const writer = port.writable.getWriter(); const encoder = new TextEncoder();
        const btn = document.getElementById('btn-push'); const autoExport = document.getElementById('cb-autoexport').checked; 
        try {
            btn.innerText = "COMPILING..."; let pool = new Uint8Array(230), pOff = 0; let b = new Uint8Array(1024), off = 0; b[off++] = 66; b[off++] = 75; b[off++] = 50; 
            
            [cfg.bank1, cfg.bank2].forEach(bank => {
                for(let l=0; l<2; l++) for(let i=0; i<3; i++) {
                    let d = bank.btn3_5[l][i];
                    if(d.m==4) {
                        let s1 = encoder.encode((d.t1||"") + "\0"), s2 = encoder.encode((d.t2||"") + "\0"); let total = s1.length + (d.v2==2 ? s2.length : 0);
                        if(pOff + total <= 230) { d.v3 = pOff; pool.set(s1, pOff); pOff += s1.length; if(d.v2==2) { pool.set(s2, pOff); pOff += s2.length; } } else { throw "KAPASITAS TEXT MACRO PENUH!"; }
                    }
                }
            });

            const pack_4 = (o) => { b[off++]=o.m; b[off++]=o.v1; b[off++]=o.v2; b[off++]=o.v3; let lArr = encoder.encode(o.lbl||""); for(let i=0; i<4; i++) b[off++] = i < lArr.length ? lArr[i] : 0; };
            const pack_10 = (o) => { b[off++]=o.m; b[off++]=o.v1; b[off++]=o.v2; b[off++]=o.v3; let lArr = encoder.encode(o.lbl||""); for(let i=0; i<10; i++) b[off++] = i < lArr.length ? lArr[i] : 0; };

            cfg.bank0.btn.forEach(pack_4); cfg.bank0.pot.forEach(pack_4); pack_4(cfg.bank0.enc);
            b[off++] = cfg.bank0.bright; b[off++] = cfg.bank0.anim; cfg.bank0.col.forEach(c=>b[off++]=c); cfg.bank0.colActive.forEach(c=>b[off++]=c); cfg.bank0.colShift.forEach(c=>b[off++]=c);

            [cfg.bank1, cfg.bank2].forEach(bank => {
                for(let l=0; l<2; l++) bank.btn1_2[l].forEach(pack_4); for(let l=0; l<2; l++) bank.btn3_5[l].forEach(pack_10); for(let l=0; l<2; l++) bank.btn6_11[l].forEach(pack_4);
                for(let l=0; l<2; l++) bank.pot[l].forEach(pack_4); for(let l=0; l<2; l++) pack_4(bank.enc[l]);
                b[off++] = bank.bright; b[off++] = bank.anim; bank.col.forEach(c=>b[off++]=c); bank.colActive.forEach(c=>b[off++]=c); bank.colShift.forEach(c=>b[off++]=c); bank.colB6.forEach(c=>b[off++]=c); 
            }); pool.forEach(p => b[off++] = p);

            const hex = Array.from(b, x => x.toString(16).padStart(2,'0').toUpperCase()).join('');
            await writer.write(encoder.encode("<PAUSE>\n")); if(!(await waitFor("<NEXT>"))) throw "No Response";
            await writer.write(encoder.encode("<CFG>\n")); if(!(await waitFor("<NEXT>"))) throw "Sync Error";
            for(let i=0; i<hex.length; i+=64) { await writer.write(encoder.encode(hex.substring(i, i+64) + "\n")); let pct = Math.round((i/hex.length)*100); btn.innerText = `BURNING... ${pct}%`; if(!(await waitFor("<NEXT>"))) throw "Comm Error"; }
            await writer.write(encoder.encode("</CFG>\n")); if(!(await waitFor("<SUCCESS>"))) throw "Verify Fail";
            markSaved(); showToast("SUKSES SUNTIK KE ALAT!"); if(autoExport) exportData(); 
        } catch(e) { showToast(e); btn.innerText = "⚡ PUSH TO DEVICE"; }
        writer.releaseLock();
    }

    async function syncDevice() {
        if(!port) { let connected = await connectUSB(); if(!connected) return; }
        const writer = port.writable.getWriter(); const encoder = new TextEncoder();
        try {
            document.querySelector('.btn-sync').innerText = "SYNCING..."; showToast("MENARIK DATA...");
            await writer.write(encoder.encode("<SYNC>\n")); let start = Date.now(), syncHex = "";
            while(Date.now() - start < 4000) { const {value} = await serialReader.read(); if(value) syncHex += value; if(syncHex.length >= 2048 && syncHex.includes("\n")) break; }
            syncHex = syncHex.trim(); 
            if(syncHex.length >= 2048) { parseHexToConfig(syncHex); switchBank(curB); localStorage.setItem('baysKONTROLMK2', JSON.stringify(cfg)); markSaved(); showToast("SINKRONISASI BERHASIL!"); } else { throw "Versi Firmware Tidak Cocok!"; }
        } catch(e) { showToast("ERROR: " + e); } document.querySelector('.btn-sync').innerText = "SYNC"; writer.releaseLock();
    }

    function parseHexToConfig(hex) {
        let off = 0; const getB = () => parseInt(hex.substr(off++*2, 2), 16); getB(); getB(); getB(); 
        const read_4 = () => { let m=getB(), v1=getB(), v2=getB(), v3=getB(), lbl=""; for(let i=0;i<4;i++){ let c=getB(); if(c!=0)lbl+=String.fromCharCode(c); } return {m, v1, v2, v3, lbl}; };
        const read_10 = () => { let m=getB(), v1=getB(), v2=getB(), v3=getB(), lbl=""; for(let i=0;i<10;i++){ let c=getB(); if(c!=0)lbl+=String.fromCharCode(c); } return {m, v1, v2, v3, t1:"", t2:"", lbl}; };
        
        for(let i=0; i<11; i++) cfg.bank0.btn[i] = read_4(); for(let i=0; i<5; i++) cfg.bank0.pot[i] = read_4(); cfg.bank0.enc = read_4();
        cfg.bank0.bright=getB(); cfg.bank0.anim=getB(); cfg.bank0.col=[getB(),getB(),getB()]; cfg.bank0.colActive=[getB(),getB(),getB()]; cfg.bank0.colShift=[getB(),getB(),getB()];

        [cfg.bank1, cfg.bank2].forEach(bank => {
            for(let l=0; l<2; l++) for(let i=0; i<2; i++) bank.btn1_2[l][i] = read_4(); for(let l=0; l<2; l++) for(let i=0; i<3; i++) bank.btn3_5[l][i] = read_10(); for(let l=0; l<2; l++) for(let i=0; i<6; i++) bank.btn6_11[l][i] = read_4();
            for(let l=0; l<2; l++) for(let i=0; i<5; i++) bank.pot[l][i] = read_4(); for(let l=0; l<2; l++) bank.enc[l] = read_4();
            bank.bright=getB(); bank.anim=getB(); bank.col=[getB(),getB(),getB()]; bank.colActive=[getB(),getB(),getB()]; bank.colShift=[getB(),getB(),getB()]; bank.colB6=[getB(),getB(),getB()];
        });

        let poolArr = []; for(let i=0; i<230; i++) poolArr.push(getB());
        [cfg.bank1, cfg.bank2].forEach(bank => {
            for(let l=0; l<2; l++) for(let i=0; i<3; i++) {
                let act = bank.btn3_5[l][i];
                if(act.m === 4) { 
                    let idx = act.v3, str1 = ""; while(idx < 230 && poolArr[idx] !== 0) str1 += String.fromCharCode(poolArr[idx++]); act.t1 = str1; idx++; 
                    if(act.v2 === 2) { let str2 = ""; while(idx < 230 && poolArr[idx] !== 0) str2 += String.fromCharCode(poolArr[idx++]); act.t2 = str2; } 
                }
            }
        });
    }

    async function waitFor(exp) { let start = Date.now(), buf = ""; while(Date.now() - start < 3000) { const {value} = await serialReader.read(); if(value) buf += value; if(buf.includes(exp)) return true; await new Promise(r=>setTimeout(r,10)); } return false; }
</script>
